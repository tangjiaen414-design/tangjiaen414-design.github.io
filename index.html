<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>心动刮刮乐 | 稳稳显示图片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fecfcc, #ffe1df, #fbc8cd);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .card {
            background: rgba(255,250,245,0.92);
            backdrop-filter: blur(16px);
            border-radius: 60px;
            padding: 30px 20px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0,0,0,0.2);
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #d4425c, #ff8c66);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .sub {
            background: rgba(255,230,220,0.7);
            display: inline-block;
            padding: 5px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #b45a6b;
            margin-bottom: 25px;
        }
        .scratch-box {
            background: #f3e7df;
            border-radius: 48px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .coating {
            background: radial-gradient(circle at 30% 20%, #e5cfc0, #cfb6a4);
            border-radius: 40px;
            padding: 50px 20px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .coating:active {
            transform: scale(0.97);
        }
        .coating div {
            font-size: 2rem;
            font-weight: bold;
            color: #fff5e6;
            text-shadow: 2px 2px 6px #a6583a;
        }
        .prize-area {
            display: none;
            background: #fff2ed;
            border-radius: 40px;
            padding: 20px;
        }
        .prize-area.show {
            display: block;
            animation: fadePop 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        @keyframes fadePop {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .prize-img {
            width: 80%;
            max-width: 260px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            padding: 16px;
            box-shadow: 0 12px 20px rgba(0,0,0,0.1);
        }
        .prize-img img {
            width: 100%;
            height: auto;
            border-radius: 20px;
            display: block;
        }
        button {
            background: linear-gradient(95deg, #ff9b7c, #ff7c5c);
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 6px 14px rgba(200,70,50,0.3);
        }
        button:active {
            transform: scale(0.96);
        }
        .footer {
            margin-top: 24px;
            font-size: 0.7rem;
            color: #c56a6a;
            background: rgba(255,245,220,0.6);
            display: inline-block;
            padding: 5px 16px;
            border-radius: 30px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🎁 心动刮刮乐</h1>
    <div class="sub">轻触涂层 · 刮出惊喜</div>

    <div class="scratch-box">
        <div id="coatingLayer" class="coating">
            <div>✨ 刮开涂层 ✨</div>
            <div style="font-size: 1rem; margin-top: 15px;">👇 点击一下 👇</div>
        </div>
        <div id="prizeDisplay" class="prize-area">
            <div class="prize-img">
                <img id="prizeImage" src="" alt="奖品">
            </div>
        </div>
    </div>

    <button id="resetBtn">🔁 再来一张</button>
    <div class="footer">❤️ 每一份礼物都是心意 ❤️</div>
</div>

<script>
    // ========== 硬编码图片路径（请确认图片是 1.jpg ~ 9.jpg）==========
    const TOTAL_IMAGES = 9;                // 图片总数
    const IMAGE_FOLDER = "prize-images";   // 文件夹名

    // 直接构建 9 个图片 URL（完全可靠）
    const imageUrls = [];
    for (let i = 1; i <= TOTAL_IMAGES; i++) {
        imageUrls.push(`${IMAGE_FOLDER}/${i}.jpg`);
    }

    let isRevealed = false;

    const coating = document.getElementById('coatingLayer');
    const prizeDisplay = document.getElementById('prizeDisplay');
    const prizeImg = document.getElementById('prizeImage');
    const resetBtn = document.getElementById('resetBtn');

    function getRandomImageUrl() {
        const idx = Math.floor(Math.random() * imageUrls.length);
        return imageUrls[idx];
    }

    function revealPrize() {
        if (isRevealed) return;
        const url = getRandomImageUrl();
        prizeImg.src = url;
        // 如果图片加载失败（理论上不会，因为直接访问能成功），显示一个简单提示
        prizeImg.onerror = () => {
            prizeImg.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23ffb3ba'/%3E%3Ctext x='50' y='70' text-anchor='middle' fill='%23cc0000' font-size='22'%3E!%3C/text%3E%3C/svg%3E";
        };
        coating.style.display = 'none';
        prizeDisplay.classList.add('show');
        isRevealed = true;
    }

    function resetGame() {
        coating.style.display = 'flex';
        prizeDisplay.classList.remove('show');
        isRevealed = false;
        prizeImg.src = "";
    }

    coating.addEventListener('click', revealPrize);
    resetBtn.addEventListener('click', resetGame);
</script>
</body>
</html>
