<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>心动刮刮乐 | 图片奖品版</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fecfcc 0%, #ffe1df 30%, #fbc8cd 100%);
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }
        /* 背景粒子效果 */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            background: rgba(255, 210, 210, 0.5);
            border-radius: 50%;
            animation: floatParticle 14s infinite ease-in-out;
            backdrop-filter: blur(1px);
        }
        @keyframes floatParticle {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.5; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }
        .scratch-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        .scratch-card {
            background: rgba(255, 250, 245, 0.92);
            backdrop-filter: blur(16px);
            border-radius: 68px;
            box-shadow: 0 30px 45px -20px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 245, 225, 0.7) inset;
            padding: 2rem 1.8rem 2.2rem;
            text-align: center;
        }
        .title-area {
            margin-bottom: 1.8rem;
        }
        .title-area h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #d4425c, #ff8c66);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .title-area i {
            font-size: 1.8rem;
            color: #ff5e7e;
        }
        .sub {
            color: #b45a6b;
            font-weight: 500;
            font-size: 0.85rem;
            background: rgba(255, 230, 220, 0.7);
            display: inline-block;
            padding: 5px 18px;
            border-radius: 60px;
            margin-top: 8px;
        }
        .scratch-zone {
            margin: 0 0 1.5rem 0;
        }
        .gift-stage {
            background: #fff2ed;
            border-radius: 48px;
            min-height: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.2rem;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 245, 230, 0.9);
            position: relative;
            overflow: hidden;
        }
        /* 涂层样式 */
        .coating-layer {
            width: 100%;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            background: radial-gradient(circle at 30% 20%, #e5cfc0, #cfb6a4);
            border-radius: 42px;
            box-shadow: 0 0 0 2px rgba(255, 215, 185, 0.6), inset 0 1px 4px rgba(0,0,0,0.05);
            position: relative;
        }
        .coating-layer::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, rgba(255,235,200,0.4) 0px, rgba(255,235,200,0.4) 2px, rgba(210,170,140,0.2) 2px, rgba(210,170,140,0.2) 8px);
            border-radius: 42px;
            pointer-events: none;
        }
        .coating-layer:active {
            transform: scale(0.98);
        }
        .coating-icon {
            font-size: 3.6rem;
            color: #ffe1c6;
            text-shadow: 2px 2px 0 #b87a5a;
            margin-bottom: 1rem;
            z-index: 2;
        }
        .coating-text {
            font-weight: 800;
            font-size: 1.7rem;
            letter-spacing: 3px;
            color: #fff5e6;
            text-shadow: 2px 2px 6px #a6583a;
            background: rgba(0,0,0,0.1);
            padding: 0.3rem 1.2rem;
            border-radius: 60px;
            font-family: 'Playfair Display', serif;
        }
        .coating-hint {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #f9e0ce;
            background: rgba(90, 45, 30, 0.3);
            padding: 5px 14px;
            border-radius: 30px;
        }
        /* 奖品展示区 - 只显示图片 */
        .prize-display {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.85) translateY(20px);
            transition: opacity 0.55s cubic-bezier(0.2, 0.9, 0.3, 1.2), transform 0.55s cubic-bezier(0.2, 0.85, 0.3, 1.2);
            pointer-events: none;
        }
        .prize-display.show-prize {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }
        .prize-img {
            width: 200px;
            height: 200px;
            background: #fff3ea;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.5rem;
            box-shadow: 0 20px 30px -8px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            padding: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .prize-img:active {
            transform: scale(0.98);
        }
        .prize-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            pointer-events: none; /* 让点击事件由父容器处理 */
        }
        /* 隐藏文字区域 */
        .prize-name, .prize-message {
            display: none;
        }
        .action-buttons {
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 1.2rem;
        }
        .btn-reset {
            background: linear-gradient(95deg, #ff9b7c, #ff7c5c);
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(200, 70, 50, 0.3);
            transition: all 0.25s ease;
            font-family: 'Inter', sans-serif;
        }
        .btn-reset:active {
            transform: scale(0.95);
        }
        .deco-note {
            margin-top: 1.8rem;
            font-size: 0.75rem;
            color: #c56a6a;
            background: rgba(255,245,205,0.5);
            border-radius: 100px;
            padding: 5px 12px;
            display: inline-block;
        }
        /* 刮开闪光效果 */
        @keyframes sparkleWin {
            0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.5); background: radial-gradient(circle, #fff6e0, #ffe6ce);}
            50% { box-shadow: 0 0 0 12px rgba(255, 180, 70, 0.3); background: radial-gradient(circle, #fff0d0, #ffdbc2);}
            100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); background: radial-gradient(circle, #fff2ed, #ffe2d5);}
        }
        .win-flash {
            animation: sparkleWin 0.7s cubic-bezier(0.2, 1, 0.3, 1) forwards;
        }
        .coating-fadeout {
            animation: fadeOutScale 0.45s forwards !important;
        }
        @keyframes fadeOutScale {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.7); visibility: hidden; }
        }
        @media (max-width: 550px) {
            .scratch-card {
                padding: 1.5rem 1rem;
            }
            .prize-img {
                width: 160px;
                height: 160px;
            }
            .coating-text {
                font-size: 1.4rem;
            }
            .title-area h1 {
                font-size: 1.8rem;
            }
            .btn-reset {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
<div class="bg-particles" id="particles"></div>
<div class="scratch-wrapper">
    <div class="scratch-card">
        <div class="title-area">
            <h1><i class="fas fa-gift"></i> 心动刮刮乐</h1>
            <div class="sub"><i class="fas fa-hand-peace"></i> 轻触涂层 · 收获专属惊喜</div>
        </div>
        <div class="scratch-zone">
            <div class="gift-stage" id="giftStage">
                <div id="coatingLayer" class="coating-layer">
                    <div class="coating-icon"><i class="fas fa-coin"></i><i class="fas fa-star-of-life"></i></div>
                    <div class="coating-text">刮 开 涂 层</div>
                    <div class="coating-hint"><i class="fas fa-fingerprint"></i> 点击一下 · 好运开启</div>
                </div>
                <div id="prizeDisplay" class="prize-display">
                    <div class="prize-img" id="prizeImgWrapper">
                        <img id="prizeImage" src="" alt="惊喜奖品">
                    </div>
                    <!-- 以下两个元素已隐藏，不再显示文字 -->
                    <div class="prize-name" id="prizeName"></div>
                    <div class="prize-message" id="prizeDesc"></div>
                </div>
            </div>
        </div>
        <div class="action-buttons">
            <button class="btn-reset" id="resetBtn"><i class="fas fa-redo-alt"></i> 再来一张</button>
        </div>
        <div class="deco-note"><i class="fas fa-heart"></i> 每一份惊喜，都是爱的心意 <i class="fas fa-heart"></i></div>
    </div>
</div>

<script>
    // ======================== 配置区 ========================
    const IMAGE_FOLDER = "prize-images";   // 图片文件夹名称（与你现有一致）
    // ======================================================

    // 自动探测图片总数，并生成奖品列表（保留你原有的可靠逻辑）
    async function fetchAllPrizes() {
        let index = 1;
        const prizes = [];
        const extensions = ['jpg', 'jpeg', 'png', 'webp'];  // 按需调整顺序
        
        while (true) {
            let found = false;
            for (let ext of extensions) {
                let url = `${IMAGE_FOLDER}/${index}.${ext}`;
                let exists = await checkImageExists(url);
                if (exists) {
                    prizes.push({ img: `${index}.${ext}`, fullUrl: url });
                    found = true;
                    break;
                }
            }
            if (!found) break;
            index++;
        }
        if (prizes.length === 0) {
            console.warn("未在", IMAGE_FOLDER, "中找到任何以数字命名的图片（1.jpg,2.png...）");
            // 提示用户（只在控制台提示，页面不再显示文字）
        }
        return prizes;
    }

    function checkImageExists(url) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => resolve(true);
            img.onerror = () => resolve(false);
            img.src = url;
        });
    }

    let prizeList = [];
    let isScratched = false;
    let isAnimating = false;
    let currentPrizeUrl = '';  // 存储当前奖品图片的完整URL，用于点击打开

    const coatingLayer = document.getElementById('coatingLayer');
    const prizeDisplay = document.getElementById('prizeDisplay');
    const prizeImage = document.getElementById('prizeImage');
    const prizeImgWrapper = document.getElementById('prizeImgWrapper');
    const resetBtn = document.getElementById('resetBtn');
    const giftStage = document.getElementById('giftStage');

    function getRandomPrize() {
        if (!prizeList.length) return null;
        const randomIndex = Math.floor(Math.random() * prizeList.length);
        return prizeList[randomIndex];
    }

    function setPrizeContent(prize) {
        if (!prize) return;
        const imgPath = prize.fullUrl; // 已经是完整相对路径
        currentPrizeUrl = imgPath;
        prizeImage.src = imgPath;
        // 图片加载失败时的后备（基本不会触发，因为之前检测过了）
        prizeImage.onerror = () => {
            prizeImage.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23ffcdb0'/%3E%3Ctext x='50' y='67' text-anchor='middle' fill='%23944d3a' font-size='14'%3E?%3C/text%3E%3C/svg%3E";
        };
    }

    // 点击图片打开大图（新标签页，方便保存）
    function openFullImage() {
        if (currentPrizeUrl) {
            window.open(currentPrizeUrl, '_blank');
        }
    }

    async function scratchToReveal() {
        if (isScratched || isAnimating) return;
        if (prizeList.length === 0) {
            // 如果没有奖品，尝试重新加载一次
            prizeList = await fetchAllPrizes();
            if (prizeList.length === 0) {
                alert("未找到奖品图片，请确认 prize-images 文件夹中有 1.jpg, 2.jpg ... 等图片");
                return;
            }
        }
        isAnimating = true;
        const prize = getRandomPrize();
        setPrizeContent(prize);

        coatingLayer.classList.add('coating-fadeout');
        const onFadeEnd = () => {
            coatingLayer.style.display = 'none';
            coatingLayer.classList.remove('coating-fadeout');
            prizeDisplay.classList.add('show-prize');
            giftStage.classList.add('win-flash');
            setTimeout(() => giftStage.classList.remove('win-flash'), 700);
            isScratched = true;
            isAnimating = false;
            coatingLayer.removeEventListener('animationend', onFadeEnd);
        };
        coatingLayer.addEventListener('animationend', onFadeEnd, { once: true });
        // 后备定时器
        setTimeout(() => {
            if (isAnimating && !isScratched) {
                if (coatingLayer.style.display !== 'none') coatingLayer.style.display = 'none';
                prizeDisplay.classList.add('show-prize');
                giftStage.classList.add('win-flash');
                setTimeout(() => giftStage.classList.remove('win-flash'), 700);
                isScratched = true;
                isAnimating = false;
            }
        }, 500);
    }

    function resetGame() {
        if (isAnimating) return;
        isScratched = false;
        prizeDisplay.classList.remove('show-prize');
        coatingLayer.style.display = 'flex';
        coatingLayer.classList.remove('coating-fadeout');
        prizeImage.src = "";
        currentPrizeUrl = "";
        void coatingLayer.offsetHeight;
    }

    // 绑定事件
    async function init() {
        prizeList = await fetchAllPrizes();
        console.log(`🎁 共加载 ${prizeList.length} 个奖品`, prizeList);
        coatingLayer.addEventListener('click', scratchToReveal);
        resetBtn.addEventListener('click', resetGame);
        prizeImgWrapper.addEventListener('click', openFullImage);
    }
    init();

    // 背景粒子效果（保留）
    function createParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 45; i++) {
            const p = document.createElement('div');
            p.classList.add('particle');
            const s = 3 + Math.random() * 12;
            p.style.width = s + 'px';
            p.style.height = s + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 15 + 's';
            p.style.animationDuration = 8 + Math.random() * 12 + 's';
            p.style.opacity = 0.2 + Math.random() * 0.4;
            container.appendChild(p);
        }
    }
    createParticles();
</script>
</body>
</html>
