<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>心动刮刮乐 | 自动适配扩展名</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* 样式保持和之前一样，此处省略以节约空间，但实际必须包含完整样式 */
        /* 由于消息长度限制，我将提供完整的最小化样式，确保功能正常 */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fecfcc 0%, #ffe1df 30%, #fbc8cd 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            padding: 1.5rem;
        }
        .scratch-wrapper { max-width: 500px; width: 100%; }
        .scratch-card {
            background: rgba(255, 250, 245, 0.88);
            backdrop-filter: blur(12px);
            border-radius: 68px;
            padding: 2rem 1.8rem 2.2rem;
            text-align: center;
            box-shadow: 0 30px 45px -20px rgba(0,0,0,0.3);
        }
        .title-area h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            background: linear-gradient(135deg, #d4425c, #ff8c66);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .sub { color: #b45a6b; font-size: 0.85rem; background: rgba(255,230,220,0.7); display: inline-block; padding: 5px 18px; border-radius: 60px; margin-top: 8px; }
        .gift-stage {
            background: #fff2ed;
            border-radius: 48px;
            min-height: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.2rem;
            margin: 1.5rem 0;
            position: relative;
        }
        .coating-layer {
            width: 100%;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: radial-gradient(circle at 30% 20%, #e5cfc0, #cfb6a4);
            border-radius: 42px;
            position: relative;
        }
        .coating-layer::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, rgba(255,235,200,0.4) 0px, rgba(255,235,200,0.4) 2px, rgba(210,170,140,0.2) 2px, rgba(210,170,140,0.2) 8px);
            border-radius: 42px;
            pointer-events: none;
        }
        .coating-text { font-size: 1.7rem; font-weight: bold; color: #fff5e6; text-shadow: 2px 2px 6px #a6583a; background: rgba(0,0,0,0.1); padding: 0.3rem 1.2rem; border-radius: 60px; }
        .coating-hint { margin-top: 1rem; font-size: 0.8rem; color: #f9e0ce; background: rgba(90,45,30,0.3); padding: 5px 14px; border-radius: 30px; }
        .prize-display { display: none; align-items: center; justify-content: center; }
        .prize-display.show { display: flex; animation: fadeInUp 0.55s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .prize-img { width: 200px; height: 200px; background: #fff3ea; border-radius: 32px; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 20px 30px -8px rgba(0,0,0,0.2); padding: 12px; }
        .prize-img img { width: 100%; height: 100%; object-fit: contain; }
        .btn-reset { background: linear-gradient(95deg, #ff9b7c, #ff7c5c); border: none; padding: 12px 28px; border-radius: 60px; font-weight: bold; color: white; cursor: pointer; margin-top: 1rem; }
        .deco-note { margin-top: 1.8rem; font-size: 0.75rem; color: #c56a6a; background: rgba(255,245,205,0.5); border-radius: 100px; padding: 5px 12px; display: inline-block; }
        .win-flash { animation: sparkleWin 0.7s forwards; }
        @keyframes sparkleWin { 0% { box-shadow: 0 0 0 0 rgba(255,215,0,0.5); background: radial-gradient(circle, #fff6e0, #ffe6ce);} 100% { box-shadow: 0 0 0 0 rgba(255,215,0,0); background: radial-gradient(circle, #fff2ed, #ffe2d5);} }
        .coating-fadeout { animation: fadeOutScale 0.45s forwards; }
        @keyframes fadeOutScale { to { opacity: 0; visibility: hidden; } }
        @media (max-width: 550px) { .prize-img { width: 160px; height: 160px; } }
    </style>
</head>
<body>
<div class="scratch-wrapper">
    <div class="scratch-card">
        <div class="title-area"><h1><i class="fas fa-gift"></i> 心动刮刮乐</h1><div class="sub"><i class="fas fa-hand-peace"></i> 轻触涂层 · 收获惊喜</div></div>
        <div class="gift-stage" id="giftStage">
            <div id="coatingLayer" class="coating-layer">
                <div class="coating-icon"><i class="fas fa-coin"></i><i class="fas fa-star-of-life"></i></div>
                <div class="coating-text">刮 开 涂 层</div>
                <div class="coating-hint"><i class="fas fa-fingerprint"></i> 点击一下</div>
            </div>
            <div id="prizeDisplay" class="prize-display"><div class="prize-img"><img id="prizeImage" src="" alt="奖品"></div></div>
        </div>
        <button class="btn-reset" id="resetBtn"><i class="fas fa-redo-alt"></i> 再来一张</button>
        <div class="deco-note"><i class="fas fa-heart"></i> 每一份惊喜，都是爱的心意</div>
    </div>
</div>

<script>
    const TOTAL_IMAGES = 9;   // 改成您的图片总数
    const IMAGE_FOLDER = "prize-images";
    const EXTENSIONS = ['jpg', 'jpeg', 'png', 'webp', 'JPG', 'JPEG', 'PNG', 'WEBP']; // 自动尝试多种扩展名

    let prizeList = [];
    let isScratched = false;
    let isAnimating = false;

    const coatingLayer = document.getElementById('coatingLayer');
    const prizeDisplay = document.getElementById('prizeDisplay');
    const prizeImage = document.getElementById('prizeImage');
    const resetBtn = document.getElementById('resetBtn');
    const giftStage = document.getElementById('giftStage');

    // 异步检测图片是否存在（自动匹配扩展名）
    async function findImagePath(baseNumber) {
        for (let ext of EXTENSIONS) {
            const url = `${IMAGE_FOLDER}/${baseNumber}.${ext}`;
            const exists = await new Promise(resolve => {
                const img = new Image();
                img.onload = () => resolve(true);
                img.onerror = () => resolve(false);
                img.src = url;
            });
            if (exists) return url;
        }
        return null;
    }

    async function buildPrizeList() {
        const list = [];
        for (let i = 1; i <= TOTAL_IMAGES; i++) {
            const url = await findImagePath(i);
            if (url) {
                list.push({ url: url, index: i });
            } else {
                console.warn(`未找到图片 ${i}`);
            }
        }
        return list;
    }

    async function init() {
        prizeList = await buildPrizeList();
        if (prizeList.length === 0) {
            // 没有图片时显示提示，但您的图片存在，不会进入这里
            prizeImage.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23ffcccc'/%3E%3Ctext x='50' y='67' text-anchor='middle' fill='%23cc0000' font-size='14'%3E!%3C/text%3E%3C/svg%3E";
        }
    }

    function getRandomPrize() {
        if (!prizeList.length) return null;
        return prizeList[Math.floor(Math.random() * prizeList.length)];
    }

    function setPrizeContent(prize) {
        prizeImage.src = prize.url;
        prizeImage.onerror = () => {
            prizeImage.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23ffcccc'/%3E%3Ctext x='50' y='67' text-anchor='middle' fill='%23cc0000' font-size='14'%3E!%3C/text%3E%3C/svg%3E";
        };
    }

    async function scratchToReveal() {
        if (isScratched || isAnimating) return;
        if (prizeList.length === 0) {
            await init(); // 重新尝试加载
            if (prizeList.length === 0) return;
        }
        isAnimating = true;
        const prize = getRandomPrize();
        setPrizeContent(prize);

        coatingLayer.classList.add('coating-fadeout');
        const onFadeEnd = () => {
            coatingLayer.style.display = 'none';
            coatingLayer.classList.remove('coating-fadeout');
            prizeDisplay.classList.add('show');
            giftStage.classList.add('win-flash');
            setTimeout(() => giftStage.classList.remove('win-flash'), 700);
            isScratched = true;
            isAnimating = false;
            coatingLayer.removeEventListener('animationend', onFadeEnd);
        };
        coatingLayer.addEventListener('animationend', onFadeEnd, { once: true });
        setTimeout(() => {
            if (isAnimating && !isScratched) {
                coatingLayer.style.display = 'none';
                prizeDisplay.classList.add('show');
                giftStage.classList.add('win-flash');
                setTimeout(() => giftStage.classList.remove('win-flash'), 700);
                isScratched = true;
                isAnimating = false;
            }
        }, 500);
    }

    function resetGame() {
        if (isAnimating) return;
        isScratched = false;
        prizeDisplay.classList.remove('show');
        coatingLayer.style.display = 'flex';
        coatingLayer.classList.remove('coating-fadeout');
        prizeImage.src = "";
    }

    coatingLayer.addEventListener('click', scratchToReveal);
    resetBtn.addEventListener('click', resetGame);
    init();
</script>
</body>
</html>
